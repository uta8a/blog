name: Deploy blog to Cloudflare Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  actions-timeline:
    timeout-minutes: 11
    needs: [publish]
    runs-on: ubuntu-latest
    permissions:
      actions: read
    steps:
      - uses: Kesin11/actions-timeline@e018cfefea60b4f44266998551211a35a58b8097 # v3.0.0
  publish:
    timeout-minutes: 17
    runs-on: ubuntu-latest
    permissions:
      contents: read
      deployments: write
    env:
      LANG: ja_JP.UTF-8
    name: Publish to Cloudflare Pages
    steps:
      - name: ja_JP.UTF-8
        run: |
          sudo locale-gen ja_JP.UTF-8
          sudo update-locale LANG=ja_JP.UTF-8
      - name: Set timezone to JST
        # lume の `log.date | date('DATETIME', 'ja')` が動くにはタイムゾーンを日本に変更する必要がある
        run: |
          sudo timedatectl set-timezone Asia/Tokyo
      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: ~/.cache/deno
          key: deno-${{ github.job }}-${{ hashFiles('deno.lock') }}
          restore-keys: |
            deno-${{ github.job }}-
      - uses: actions/cache@cdf6c1fa76f9f475f3d7449005a359c84ca0f306 # v5.0.3
        with:
          path: _cache
          key: lumecache-${{ github.job }}-${{ hashFiles('deno.lock') }}
          restore-keys: |
            lumecache-${{ github.job }}-
      - uses: denoland/setup-deno@e95548e56dfa95d4e1a28d6f422fafe75c4c26fb # v2.0.3
      - name: Generate raw YAML for build
        run: deno task sync
      - name: Build blog
        run: deno task build
      - name: Set Content-Type header
        run: |
          echo "/feed.rss\n  Content-Type: application/xml" >> _site/_headers
      - name: Setup pnpm
        uses: pnpm/action-setup@41ff72655975bd51cab0327fa583b6e92b6d3061 # v4.2.0
        with:
          version: 10.30.3
      - name: Publish to Cloudflare Pages
        uses: cloudflare/wrangler-action@da0e0dfe58b7a431659754fdf3f186c529afbe65 # v3.14.1
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy _site --project-name=${{ secrets.CLOUDFLARE_PAGES_PROJECT_NAME }}
          packageManager: pnpm
